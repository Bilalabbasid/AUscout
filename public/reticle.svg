<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <pattern id="reticle" width="32" height="32" patternUnits="userSpaceOnUse">
      <!-- Crosshair lines -->
      <line x1="0" y1="16" x2="32" y2="16" stroke="#1A1C22" stroke-width="0.5" />
      <line x1="16" y1="0" x2="16" y2="32" stroke="#1A1C22" stroke-width="0.5" />
      <!-- Small center dot -->
      <circle cx="16" cy="16" r="0.5" fill="#1E2130" />
    </pattern>
  </defs>
  <rect width="32" height="32" fill="url(#reticle)" />
</svg>
